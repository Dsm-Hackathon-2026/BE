name: SDSR-PROD-CD

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

      - name: Grant execute permission for Gradle
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build -x test --parallel --build-cache

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/sdsr-backend:latest .

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/sdsr-backend:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo ">>> Pulling latest Docker image..."
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/sdsr-backend:latest

            echo ">>> Stopping old container..."
            sudo docker stop sdsr-backend || true
            sudo docker rm sdsr-backend || true

            echo ">>> Running new container with .env..."
            sudo docker run -d \
              --name sdsr-backend \
              --restart unless-stopped \
              -p 8080:8080 \
              --env-file /home/ubuntu/.env \
              ${{ secrets.DOCKER_USERNAME }}/sdsr-backend:latest
